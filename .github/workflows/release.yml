name: Release

on:
  push:
    tags:
      - "*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Lint
        run: npm run lint
      - name: Format check
        run: npm run fmt:check
      - name: Build
        run: npm run build
      - name: Package
        run: |
          mkdir -p obsidian-vector-search
          cp main.js manifest.json styles.css LICENSE obsidian-vector-search/
          zip -r obsidian-vector-search.zip obsidian-vector-search/
      - name: Delete existing release
        run: gh release delete "${{ github.ref_name }}" --yes || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            main.js
            manifest.json
            styles.css
            obsidian-vector-search.zip
          generate_release_notes: true
          make_latest: true
